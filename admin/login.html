<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/justixia-logo-dark.png" />
  <link rel="apple-touch-icon" href="/justixia-logo-dark.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustiXia — Administration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/tokens.css" />
  <link rel="stylesheet" href="/styles/components.css" />
  <script src="/styles/theme.js"></script>
  <style>
    .auth-top { position: absolute; top: var(--sp-4); right: var(--sp-4); }
    .back-link { display: block; text-align: center; margin-top: var(--sp-5); font-size: var(--fs-sm); color: var(--text-muted); }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body class="auth-shell">

  <div class="auth-top" id="themeSlot"></div>

  <div class="auth-card">
    <div class="auth-brand">
      <a href="/" class="nav-logo">Justi<span class="accent">Xia</span></a>
      <p>Accès réservé</p>
      <div style="margin-top: var(--sp-3);"><span class="badge badge-secondary">Administration</span></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">Connexion admin</div>
        <div class="card-sub">Espace de pilotage et de statistiques.</div>
      </div>

      <div class="alert alert-danger" id="alertBox" role="alert"></div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label class="field-label" for="email">Adresse email</label>
          <input class="input" type="email" id="email" placeholder="admin@justixia.com" autocomplete="email" required />
        </div>
        <div class="field">
          <label class="field-label" for="password">Mot de passe</label>
          <input class="input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">Se connecter</button>
      </form>
    </div>

    <a href="/" class="back-link">Retour au site</a>
  </div>

  <script type="module">
    import { getSupabase } from '/dashboard/_auth.js';

    document.getElementById('themeSlot').innerHTML = window.JxTheme.buttonHTML();

    function showError(msg) {
      const alertBox = document.getElementById('alertBox');
      alertBox.textContent = msg;
      alertBox.classList.add('show');
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const alertBox = document.getElementById('alertBox');
      alertBox.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Connexion...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const sb = await getSupabase();
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;

        const resp = await fetch('/api/admin/stats', {
          headers: { 'Authorization': `Bearer ${data.session.access_token}` }
        });

        if (resp.status === 403) {
          await sb.auth.signOut();
          throw new Error('Accès refusé. Ce compte n\'a pas les droits d\'administration.');
        }

        if (!resp.ok) {
          throw new Error('Erreur de vérification. Réessaie.');
        }

        window.location.href = '/admin/';
      } catch (err) {
        showError(err.message === 'Invalid login credentials'
          ? 'Email ou mot de passe incorrect.'
          : (err.message || 'Erreur de connexion.'));
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    });
  </script>
</body>
</html>
