<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/justixia-logo-dark.png" />
  <link rel="apple-touch-icon" href="/justixia-logo-dark.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustiXia  Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/tokens.css" />
  <link rel="stylesheet" href="/styles/components.css" />
  <script src="/styles/theme.js"></script>
  <style>
    .auth-top { position: absolute; top: var(--sp-4); right: var(--sp-4); }
    .switch-link { text-align: center; font-size: var(--fs-sm); color: var(--text-muted); margin-top: var(--sp-4); }
    .switch-link a { color: var(--primary); font-weight: var(--fw-semibold); }
    .switch-link a:hover { text-decoration: underline; }
    .divider { display: flex; align-items: center; gap: var(--sp-3); margin: var(--sp-5) 0 var(--sp-3); color: var(--text-subtle); font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 0.06em; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--divider); }
    .back-link { display: block; text-align: center; margin-top: var(--sp-5); font-size: var(--fs-sm); color: var(--text-muted); }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body class="auth-shell">

  <div class="auth-top" id="themeSlot"></div>

  <div class="auth-card">
    <div class="auth-brand">
      <a href="/" class="nav-logo">Justi<span class="accent">Xia</span></a>
      <p>Espace associations et partenaires</p>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">Connexion</div>
        <div class="card-sub">Accède à ton espace de gestion des dossiers.</div>
      </div>

      <div class="alert alert-danger" id="alertBox" role="alert"></div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label class="field-label" for="email">Adresse email</label>
          <input class="input" type="email" id="email" placeholder="contact@association.fr" autocomplete="email" required />
        </div>
        <div class="field">
          <label class="field-label" for="password">Mot de passe</label>
          <input class="input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">Se connecter</button>
      </form>

      <div class="divider">pas encore de compte ?</div>
      <p class="switch-link"><a href="/dashboard/register.html">Créer un compte gratuit</a></p>
    </div>

    <a href="/" class="back-link">Retour au site</a>
  </div>

  <script>
    document.getElementById('themeSlot').innerHTML = window.JxTheme.buttonHTML();

    const stored = localStorage.getItem('jx_session');
    if (stored) window.location.href = '/dashboard/';

    let supabaseClient = null;
    let configError = null;

    async function initSupabase() {
      const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
      const resp = await fetch('/api/config');
      if (!resp.ok) {
        const body = await resp.json().catch(() => ({}));
        const detail = body && body.detail ? body.detail : ('HTTP ' + resp.status);
        throw new Error('Service indisponible : ' + detail);
      }
      const config = await resp.json();
      if (!config.supabase_url || !config.supabase_anon_key) {
        throw new Error('Configuration manquante côté serveur. Contacte un administrateur.');
      }
      supabaseClient = createClient(config.supabase_url, config.supabase_anon_key);
    }

    function showError(msg) {
      const alertBox = document.getElementById('alertBox');
      alertBox.textContent = msg;
      alertBox.classList.add('show');
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const alertBox = document.getElementById('alertBox');
      alertBox.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Connexion...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        if (!supabaseClient) await initSupabase();

        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) throw error;

        localStorage.setItem('jx_session', JSON.stringify(data.session));
        window.location.href = '/dashboard/';
      } catch (err) {
        showError(err.message === 'Invalid login credentials'
          ? 'Email ou mot de passe incorrect.'
          : (err.message || 'Erreur de connexion.'));
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    });

    initSupabase().catch(err => {
      showError(err.message || 'Impossible de joindre le service.');
    });
  </script>
</body>
</html>
