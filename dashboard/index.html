<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustiXia — Tableau de bord</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink: #FF2D78;
      --pink-grad: linear-gradient(135deg, #FF2D78, #FF5CA8);
      --pink-glow: 0 4px 20px rgba(255,45,120,0.32);
      --pink-tag: #FFE8EF;
      --pink-bg: #FFF5F8;
      --navy: #1A1A2E;
      --body: #333344;
      --muted: #6B6B7B;
      --white: #FFFFFF;
      --grey: #F8F8FB;
      --border: #EBEBEB;
      --border-light: #F0F0F8;
      --shadow: 0 2px 20px rgba(0,0,0,0.06);
      --sidebar-w: 240px;
      --r-pill: 9999px;
      --r-card: 16px;
      --r-sm: 10px;
    }
    html { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--grey);
      color: var(--body);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* LAYOUT */
    .layout { display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--white);
      border-right: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 20;
      transition: transform 0.25s;
    }

    .sidebar-logo {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border-light);
    }

    .sidebar-logo a {
      font-size: 20px;
      font-weight: 800;
      background: var(--pink-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }

    .sidebar-logo p {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      font-weight: 500;
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--r-sm);
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      width: 100%;
      text-align: left;
    }

    .nav-item:hover { background: var(--grey); color: var(--navy); }
    .nav-item.active { background: var(--pink-tag); color: var(--pink); font-weight: 600; }

    .nav-item svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .sidebar-footer {
      padding: 16px 12px;
      border-top: 1px solid var(--border-light);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--r-sm);
      margin-bottom: 4px;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--pink-grad);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .user-email { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* MAIN */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 32px;
      max-width: calc(100vw - var(--sidebar-w));
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .topbar h1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -0.5px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--pink-grad);
      color: var(--white);
      padding: 11px 22px;
      border-radius: var(--r-pill);
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      box-shadow: var(--pink-glow);
      font-family: inherit;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .btn-primary:hover { opacity: 0.9; }

    /* STATS */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--white);
      border: 1px solid var(--border-light);
      border-radius: var(--r-card);
      padding: 22px 24px;
      box-shadow: var(--shadow);
    }

    .stat-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .stat-value { font-size: 36px; font-weight: 800; color: var(--navy); letter-spacing: -1px; line-height: 1; }
    .stat-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .stat-sub span { color: var(--pink); font-weight: 600; }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-input {
      flex: 1;
      min-width: 200px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      padding: 10px 18px;
      font-size: 14px;
      font-family: inherit;
      color: var(--body);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: var(--pink); }
    .search-input::placeholder { color: #AAAABC; }

    .filter-select {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      color: var(--body);
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .filter-select:focus { border-color: var(--pink); }

    /* TABLE */
    .table-card {
      background: var(--white);
      border: 1px solid var(--border-light);
      border-radius: var(--r-card);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead tr {
      border-bottom: 1px solid var(--border-light);
    }

    th {
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 14px 20px;
    }

    tbody tr {
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--pink-bg); }

    td {
      padding: 16px 20px;
      font-size: 14px;
      color: var(--body);
      vertical-align: middle;
    }

    .td-type { font-weight: 600; color: var(--navy); max-width: 240px; }
    .td-type small { display: block; font-weight: 400; color: var(--muted); font-size: 12px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }

    .lang-pill {
      display: inline-block;
      background: var(--grey);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: var(--r-pill);
      font-size: 12px;
      font-weight: 500;
      color: var(--body);
    }

    .status-pill {
      display: inline-block;
      padding: 4px 12px;
      border-radius: var(--r-pill);
      font-size: 12px;
      font-weight: 600;
    }

    .status-open     { background: #F3F4F6; color: #6B7280; }
    .status-progress { background: #FFFBEB; color: #92400E; border: 1px solid #FDE68A; }
    .status-resolved { background: #F0FDF4; color: #16A34A; border: 1px solid #BBF7D0; }

    .td-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .action-link {
      font-size: 13px;
      font-weight: 600;
      color: var(--pink);
      text-decoration: none;
      padding: 6px 0;
      white-space: nowrap;
    }

    .action-link:hover { text-decoration: underline; }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 64px 32px;
      color: var(--muted);
    }

    .empty-state p { font-size: 15px; margin-bottom: 20px; }

    /* MOBILE NAV */
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--white);
      border-top: 1px solid var(--border-light);
      z-index: 20;
      padding: 8px 0 env(safe-area-inset-bottom, 0);
    }

    .mobile-nav-inner {
      display: flex;
      justify-content: space-around;
    }

    .mobile-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 8px 16px;
      text-decoration: none;
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      min-width: 64px;
      border: none;
      background: none;
      font-family: inherit;
      cursor: pointer;
    }

    .mobile-nav-item.active { color: var(--pink); }

    .mobile-nav-item svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* MOBILE TOPBAR */
    .mobile-topbar {
      display: none;
      background: var(--white);
      border-bottom: 1px solid var(--border-light);
      padding: 0 16px;
      height: 60px;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .mobile-topbar a {
      font-size: 20px;
      font-weight: 800;
      background: var(--pink-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }

    /* PAGINATION */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-top: 1px solid var(--border-light);
      font-size: 13px;
      color: var(--muted);
    }

    .pagination-btns { display: flex; gap: 8px; }

    .page-btn {
      padding: 6px 14px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: var(--white);
      font-size: 13px;
      font-weight: 500;
      color: var(--body);
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    .page-btn:hover { border-color: var(--pink); color: var(--pink); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    @media (max-width: 900px) {
      .sidebar { transform: translateX(-100%); }
      .main { margin-left: 0; max-width: 100vw; padding: 16px 16px 88px; }
      .mobile-nav { display: block; }
      .mobile-topbar { display: flex; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      th:nth-child(3), td:nth-child(3) { display: none; }
    }

    @media (max-width: 540px) {
      .stats-row { grid-template-columns: 1fr; }
      th:nth-child(4), td:nth-child(4) { display: none; }
      .topbar h1 { font-size: 20px; }
    }
  </style>
</head>
<body>

<!-- SIDEBAR (desktop) -->
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <a href="/">JustiXia</a>
      <p>Espace associations</p>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard/" class="nav-item active">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dossiers
      </a>
      <a href="/app" class="nav-item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Nouveau dossier
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-email" id="userEmail">chargement...</div>
      </div>
      <button class="nav-item" id="logoutBtn" style="color:#EF4444">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Se déconnecter
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- Mobile top bar -->
    <div class="mobile-topbar">
      <a href="/">JustiXia</a>
      <a href="/app" class="btn-primary" style="padding:8px 16px;font-size:13px">Nouveau</a>
    </div>

    <div class="topbar">
      <h1>Dossiers</h1>
      <a href="/app" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nouveau dossier
      </a>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-label">Total dossiers</div>
        <div class="stat-value" id="statTotal">-</div>
        <div class="stat-sub">tous les dossiers</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">En cours</div>
        <div class="stat-value" id="statProgress">-</div>
        <div class="stat-sub">à traiter</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Cette semaine</div>
        <div class="stat-value" id="statWeek">-</div>
        <div class="stat-sub"><span id="statResolved">-</span> résolus</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <input class="search-input" id="searchInput" placeholder="Rechercher un dossier..." />
      <select class="filter-select" id="statusFilter">
        <option value="">Tous les statuts</option>
        <option value="open">Ouvert</option>
        <option value="progress">En cours</option>
        <option value="resolved">Résolu</option>
      </select>
      <select class="filter-select" id="langFilter">
        <option value="">Toutes les langues</option>
        <option value="français">Français</option>
        <option value="anglais">English</option>
        <option value="arabe">Arabe</option>
        <option value="roumain">Roumain</option>
        <option value="portugais">Portugais</option>
        <option value="espagnol">Espagnol</option>
        <option value="wolof">Wolof</option>
      </select>
    </div>

    <!-- Table -->
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Type de document</th>
            <th>Date</th>
            <th>Langue</th>
            <th>Statut</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="casesBody">
          <tr>
            <td colspan="5">
              <div class="empty-state"><p>Chargement des dossiers...</p></div>
            </td>
          </tr>
        </tbody>
      </table>
      <div class="pagination">
        <span id="paginationInfo">-</span>
        <div class="pagination-btns">
          <button class="page-btn" id="prevBtn" disabled>Précédent</button>
          <button class="page-btn" id="nextBtn" disabled>Suivant</button>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- Mobile bottom nav -->
<nav class="mobile-nav">
  <div class="mobile-nav-inner">
    <a href="/dashboard/" class="mobile-nav-item active">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dossiers
    </a>
    <a href="/app" class="mobile-nav-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Nouveau
    </a>
    <button class="mobile-nav-item" id="mobileLogout" style="color:#EF4444">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sortir
    </button>
  </div>
</nav>

<script type="module">
  import { requireAuth, logout as sbLogout, authHeaders } from '/dashboard/_auth.js';

  let SESSION = null;

  async function init() {
    SESSION = await requireAuth();
    const email = SESSION.user?.email || '';
    document.getElementById('userEmail').textContent = email;
    document.getElementById('userAvatar').textContent = email.charAt(0).toUpperCase() || 'U';
    loadCases();
  }

  async function logout() { await sbLogout(); }

  document.getElementById('logoutBtn').addEventListener('click', logout);
  document.getElementById('mobileLogout').addEventListener('click', logout);

  init();

  const STATUT_LABELS = { open: 'Ouvert', progress: 'En cours', resolved: 'Résolu' };
  const STATUT_CLASS  = { open: 'status-open', progress: 'status-progress', resolved: 'status-resolved' };

  let allCases = [];
  let filtered = [];
  let page = 1;
  const perPage = 10;

  function escapeHTML(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function formatDate(iso) {
    if (!iso) return '-';
    return new Date(iso).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function render() {
    const start = (page - 1) * perPage;
    const slice = filtered.slice(start, start + perPage);
    const tbody = document.getElementById('casesBody');

    if (!slice.length) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><p>Aucun dossier trouvé.</p><a href="/app" class="btn-primary" style="display:inline-flex">Créer le premier dossier</a></div></td></tr>`;
      document.getElementById('paginationInfo').textContent = '0 dossier';
      document.getElementById('prevBtn').disabled = true;
      document.getElementById('nextBtn').disabled = true;
      return;
    }

    tbody.innerHTML = slice.map(c => `
      <tr onclick="window.location='/dashboard/case.html?id=${escapeHTML(c.id)}'">
        <td class="td-type">${escapeHTML(c.type_document) || 'Document'}<small>${escapeHTML(c.resume) || ''}</small></td>
        <td>${formatDate(c.created_at)}</td>
        <td><span class="lang-pill">${escapeHTML(c.langue) || 'fr'}</span></td>
        <td><span class="status-pill ${STATUT_CLASS[c.status] || 'status-open'}">${STATUT_LABELS[c.status] || 'Ouvert'}</span></td>
        <td><a class="action-link" href="/dashboard/case.html?id=${escapeHTML(c.id)}" onclick="event.stopPropagation()">Voir</a></td>
      </tr>
    `).join('');

    const total = filtered.length;
    document.getElementById('paginationInfo').textContent = `${start + 1}-${Math.min(start + perPage, total)} sur ${total}`;
    document.getElementById('prevBtn').disabled = page === 1;
    document.getElementById('nextBtn').disabled = start + perPage >= total;
  }

  function applyFilters() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const st = document.getElementById('statusFilter').value;
    const lg = document.getElementById('langFilter').value;
    filtered = allCases.filter(c => {
      const matchQ = !q || (c.type_document || '').toLowerCase().includes(q) || (c.resume || '').toLowerCase().includes(q);
      const matchSt = !st || c.status === st;
      const matchLg = !lg || c.langue === lg;
      return matchQ && matchSt && matchLg;
    });
    page = 1;
    render();
  }

  document.getElementById('searchInput').addEventListener('input', applyFilters);
  document.getElementById('statusFilter').addEventListener('change', applyFilters);
  document.getElementById('langFilter').addEventListener('change', applyFilters);
  document.getElementById('prevBtn').addEventListener('click', () => { page--; render(); });
  document.getElementById('nextBtn').addEventListener('click', () => { page++; render(); });

  async function loadCases() {
    try {
      const resp = await fetch('/api/cases', {
        headers: authHeaders(SESSION)
      });
      if (resp.status === 401) { logout(); return; }
      const data = await resp.json();
      allCases = data.cases || [];

      const now = new Date();
      const weekAgo = new Date(now - 7 * 86400000);
      const thisWeek = allCases.filter(c => new Date(c.created_at) > weekAgo).length;
      const inProgress = allCases.filter(c => c.status === 'progress').length;
      const resolved = allCases.filter(c => c.status === 'resolved').length;

      document.getElementById('statTotal').textContent = allCases.length;
      document.getElementById('statProgress').textContent = inProgress;
      document.getElementById('statWeek').textContent = thisWeek;
      document.getElementById('statResolved').textContent = resolved;

      filtered = [...allCases];
      render();
    } catch {
      document.getElementById('casesBody').innerHTML = `<tr><td colspan="5"><div class="empty-state"><p>Impossible de charger les dossiers. Vérifie ta connexion.</p></div></td></tr>`;
    }
  }

  loadCases();
</script>
</body>
</html>
