<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/justixia-logo-dark.png" />
  <link rel="apple-touch-icon" href="/justixia-logo-dark.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustiXia  Dossier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/tokens.css" />
  <link rel="stylesheet" href="/styles/components.css" />
  <script src="/styles/theme.js"></script>
  <style>
    :root {
      --pink: var(--secondary);
      --pink-grad: var(--primary);
      --pink-glow: var(--shadow-md);
      --pink-tag: var(--secondary-soft);
      --pink-bg: var(--secondary-soft);
      --navy: var(--text);
      --body: var(--text);
      --muted: var(--text-muted);
      --white: var(--surface);
      --grey: var(--bg);
      --border-light: var(--border);
      --shadow: var(--shadow-md);
      --sidebar-w: 240px;
      --r-pill: var(--radius-pill);
      --r-card: var(--radius-lg);
      --r-sm: var(--radius-sm);
      --green: var(--success);
      --green-bg: var(--success-soft);
      --green-border: var(--success);
    }

    html { height: 100%; }
    body {
      min-height: 100vh;
    }

    .layout { display: flex; min-height: 100vh; }

    /* SIDEBAR  même que index.html */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--white);
      border-right: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      z-index: 20;
    }

    .sidebar-logo { padding: 24px 20px 20px; border-bottom: 1px solid var(--border-light); }
    .sidebar-logo a {
      font-size: 20px; font-weight: 800;
      background: var(--pink-grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      text-decoration: none;
    }
    .sidebar-logo p { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 500; }

    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--r-sm);
      font-size: 14px; font-weight: 500; color: var(--muted);
      text-decoration: none; transition: background 0.15s, color 0.15s;
      cursor: pointer; border: none; background: none;
      font-family: inherit; width: 100%; text-align: left;
    }

    .nav-item:hover { background: var(--grey); color: var(--navy); }
    .nav-item.active { background: var(--pink-tag); color: var(--pink); font-weight: 600; }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .sidebar-footer { padding: 16px 12px; border-top: 1px solid var(--border-light); }
    .user-info { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--r-sm); margin-bottom: 4px; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--pink-grad); display: flex; align-items: center; justify-content: center; color: var(--white); font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .user-email { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* MAIN */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 32px;
      max-width: calc(100vw - var(--sidebar-w));
    }

    /* BACK */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 24px;
      transition: color 0.15s;
    }

    .back-link:hover { color: var(--navy); }

    /* HEADER */
    .case-header {
      background: var(--white);
      border: 1px solid var(--border-light);
      border-radius: var(--r-card);
      padding: 28px 32px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      display: flex;
      gap: 20px;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .case-header h1 {
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .case-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .meta-pill {
      display: inline-block;
      background: var(--grey);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: var(--r-pill);
      font-size: 12px;
      font-weight: 500;
      color: var(--body);
    }

    .status-select {
      padding: 8px 14px;
      border-radius: var(--r-pill);
      border: 2px solid var(--border);
      background: var(--white);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      color: var(--navy);
      transition: border-color 0.2s;
    }

    .status-select:focus { border-color: var(--pink); }

    /* GRID */
    .case-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
      align-items: start;
    }

    /* CARD */
    .card {
      background: var(--white);
      border: 1px solid var(--border-light);
      border-radius: var(--r-card);
      padding: 24px 28px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .card:last-child { margin-bottom: 0; }

    .card-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .resume-text {
      font-size: 15px;
      color: var(--body);
      line-height: 1.7;
    }

    /* FINDINGS */
    .finding-row {
      padding: 12px 14px;
      margin-bottom: 8px;
      background: var(--pink-bg);
      border: 1px solid rgba(255,45,120,0.12);
      border-radius: var(--r-sm);
    }

    .finding-row:last-child { margin-bottom: 0; }
    .finding-tag { font-size: 11px; font-weight: 700; color: var(--pink); display: block; margin-bottom: 4px; }
    .finding-desc { font-size: 14px; color: var(--body); line-height: 1.55; }

    /* RIGHTS */
    .right-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-light);
      font-size: 14px; color: var(--body); line-height: 1.55;
    }

    .right-item:last-child { border-bottom: none; padding-bottom: 0; }

    .right-check {
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--pink-tag);
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }

    .right-check svg { width: 10px; height: 10px; stroke: var(--pink); stroke-width: 2.5; fill: none; }

    /* DEADLINE */
    .deadline-box {
      background: #FFFBEB; border: 1px solid #FDE68A;
      border-radius: var(--r-sm);
      padding: 14px 16px;
      font-size: 14px; color: #92400E; line-height: 1.65;
    }

    /* LETTER */
    .letter-text {
      background: var(--grey);
      border-radius: var(--r-sm);
      padding: 24px;
      font-size: 14px; line-height: 1.85;
      white-space: pre-wrap; color: var(--body);
      font-family: Georgia, serif;
      max-height: 440px; overflow-y: auto;
      border: 1px solid var(--border);
    }

    .letter-actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--pink-grad); color: var(--white);
      padding: 11px 20px; border-radius: var(--r-pill);
      font-weight: 700; font-size: 14px;
      border: none; cursor: pointer;
      box-shadow: var(--pink-glow); font-family: inherit;
      transition: opacity 0.2s;
    }

    .btn-primary:hover { opacity: 0.9; }

    .btn-outline {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--white); color: var(--body);
      padding: 10px 20px; border-radius: var(--r-pill);
      font-weight: 600; font-size: 14px;
      border: 1px solid var(--border); cursor: pointer;
      font-family: inherit; transition: border-color 0.2s, color 0.2s;
    }

    .btn-outline:hover { border-color: var(--pink); color: var(--pink); }

    /* SIDEBAR RIGHT (notes + status) */
    .side-card {
      background: var(--white);
      border: 1px solid var(--border-light);
      border-radius: var(--r-card);
      padding: 22px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .side-card-title {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.09em;
      color: var(--muted); margin-bottom: 14px;
    }

    textarea {
      width: 100%;
      background: var(--grey); border: 1px solid var(--border);
      border-radius: var(--r-sm); color: var(--body);
      font-family: 'Inter', sans-serif; font-size: 14px;
      line-height: 1.6; padding: 12px 14px;
      resize: vertical; min-height: 120px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea:focus { border-color: var(--pink); box-shadow: 0 0 0 3px rgba(255,45,120,0.1); background: var(--white); }

    .save-btn {
      width: 100%; margin-top: 10px;
      padding: 11px; border-radius: var(--r-pill);
      border: none; background: var(--pink-grad);
      color: var(--white); font-size: 14px; font-weight: 700;
      cursor: pointer; box-shadow: var(--pink-glow);
      font-family: inherit; transition: opacity 0.2s;
    }

    .save-btn:hover { opacity: 0.9; }

    .saved-indicator {
      text-align: center; font-size: 12px; color: var(--green);
      font-weight: 600; margin-top: 8px;
      opacity: 0; transition: opacity 0.3s;
    }

    .saved-indicator.show { opacity: 1; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--navy); color: var(--white);
      padding: 12px 24px; border-radius: var(--r-pill);
      font-size: 14px; font-weight: 600; z-index: 100;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* MOBILE */
    .mobile-topbar {
      display: none;
      background: var(--white); border-bottom: 1px solid var(--border-light);
      padding: 0 16px; height: 60px;
      align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }

    .mobile-topbar a {
      font-size: 20px; font-weight: 800;
      background: var(--pink-grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      text-decoration: none;
    }

    .mobile-nav {
      display: none; position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #050510; border-top: 1px solid var(--border-light);
      z-index: 20; padding: 8px 0 env(safe-area-inset-bottom, 0);
    }

    .mobile-nav-inner { display: flex; justify-content: space-around; }

    .mobile-nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 8px 16px; text-decoration: none; color: var(--muted);
      font-size: 11px; font-weight: 500; min-width: 64px;
      border: none; background: none; font-family: inherit; cursor: pointer;
    }

    .mobile-nav-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main { margin-left: 0; max-width: 100vw; padding: 16px 16px 88px; }
      .mobile-topbar { display: flex; }
      .mobile-nav { display: block; }
      .case-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 540px) {
      .case-header { padding: 20px; }
      .card { padding: 18px 16px; }
      .letter-text { padding: 16px; }
    }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <a href="/">JustiXia</a>
      <p>Espace associations</p>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard/" class="nav-item active">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dossiers
      </a>
      <a href="/app" class="nav-item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Nouveau dossier
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">U</div>
        <div class="user-email" id="userEmail"></div>
      </div>
      <button class="nav-item" id="logoutBtn" style="color:#EF4444">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Se déconnecter
      </button>
    </div>
  </aside>

  <main class="main">

    <div class="mobile-topbar">
      <a href="/">JustiXia</a>
    </div>

    <a href="/dashboard/" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Retour aux dossiers
    </a>

    <div class="case-header" id="caseHeader">
      <div>
        <h1 id="caseType">Chargement...</h1>
        <div class="case-meta">
          <span class="meta-pill" id="caseLang"></span>
          <span class="meta-pill" id="caseDate"></span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <select class="status-select" id="statusSelect">
          <option value="open">Ouvert</option>
          <option value="progress">En cours</option>
          <option value="resolved">Résolu</option>
        </select>
      </div>
    </div>

    <div class="case-grid">

      <!-- LEFT COLUMN -->
      <div>
        <div class="card">
          <div class="card-title">Résumé de la situation</div>
          <p class="resume-text" id="caseResume"></p>
        </div>

        <div class="card">
          <div class="card-title">Irrégularités détectées</div>
          <div id="irregList"></div>
        </div>

        <div class="card">
          <div class="card-title">Droits de la personne</div>
          <div id="droitsList"></div>
        </div>

        <div class="card">
          <div class="card-title">Délais légaux</div>
          <div class="deadline-box" id="delaisText"></div>
        </div>

        <div class="card">
          <div class="card-title">Lettre de réponse générée</div>
          <div class="letter-text" id="lettreText"></div>
          <div class="letter-actions">
            <button class="btn-primary" id="downloadBtn">Télécharger (.txt)</button>
            <button class="btn-outline" id="copyBtn">Copier</button>
          </div>
        </div>
      </div>

      <!-- RIGHT COLUMN -->
      <div>
        <div class="side-card">
          <div class="side-card-title">Statut du dossier</div>
          <select class="status-select" id="statusSelectMobile" style="width:100%;border-radius:10px">
            <option value="open">Ouvert</option>
            <option value="progress">En cours</option>
            <option value="resolved">Résolu</option>
          </select>
          <button class="save-btn" id="saveStatusBtn" style="margin-top:10px">Enregistrer le statut</button>
          <div class="saved-indicator" id="statusSaved">Statut mis à jour</div>
        </div>

        <div class="side-card">
          <div class="side-card-title">Notes internes</div>
          <textarea id="notesField" placeholder="Ajoute des notes sur ce dossier, les démarches effectuées, les contacts..."></textarea>
          <button class="save-btn" id="saveNotesBtn">Enregistrer les notes</button>
          <div class="saved-indicator" id="notesSaved">Notes enregistrées</div>
        </div>
      </div>

    </div>
  </main>
</div>

<nav class="mobile-nav">
  <div class="mobile-nav-inner">
    <a href="/dashboard/" class="mobile-nav-item">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Retour
    </a>
    <a href="/app" class="mobile-nav-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Nouveau
    </a>
    <button class="mobile-nav-item" id="mobileLogout" style="color:#EF4444">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sortir
    </button>
  </div>
</nav>

<script type="module">
  import { requireAuth, logout as sbLogout, authHeaders } from '/dashboard/_auth.js';

  let SESSION = null;

  const params = new URLSearchParams(window.location.search);
  const caseId = params.get('id');
  if (!caseId) window.location.href = '/dashboard/';

  let currentCase = null;

  function escapeHTML(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function formatDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });
  }

  function renderCase(c) {
    currentCase = c;
    document.title = `JustiXia  ${c.type_document || 'Dossier'}`;
    document.getElementById('caseType').textContent = c.type_document || 'Document';
    document.getElementById('caseLang').textContent = c.langue || 'fr';
    document.getElementById('caseDate').textContent = formatDate(c.created_at);
    document.getElementById('caseResume').textContent = c.resume || '';

    document.getElementById('statusSelect').value = c.status || 'open';
    document.getElementById('statusSelectMobile').value = c.status || 'open';
    document.getElementById('notesField').value = c.notes || '';

    const irregs = c.irregularites || [];
    document.getElementById('irregList').innerHTML = irregs.length
      ? irregs.map(i => `<div class="finding-row"><span class="finding-tag">${escapeHTML(i.article)}</span><span class="finding-desc">${escapeHTML(i.description)}</span></div>`).join('')
      : '<p style="font-size:14px;color:var(--muted)">Aucune irrégularité majeure détectée.</p>';

    const droits = c.droits || [];
    document.getElementById('droitsList').innerHTML = droits.length
      ? droits.map(d => `<div class="right-item"><span class="right-check"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></span>${escapeHTML(d)}</div>`).join('')
      : '<p style="font-size:14px;color:var(--muted)">Aucun droit spécifique identifié.</p>';

    document.getElementById('delaisText').textContent = c.delais || 'À vérifier avec un professionnel.';
    document.getElementById('lettreText').textContent = c.lettre || '';
  }

  async function loadCase() {
    try {
      const resp = await fetch(`/api/cases/${caseId}`, {
        headers: authHeaders(SESSION),
      });
      if (resp.status === 401) { sbLogout(); return; }
      if (resp.status === 404) { window.location.href = '/dashboard/'; return; }
      renderCase(await resp.json());
    } catch {
      showToast('Impossible de charger le dossier.');
    }
  }

  async function saveStatus(status) {
    try {
      const resp = await fetch(`/api/cases/${caseId}`, {
        method: 'PATCH',
        headers: { ...authHeaders(SESSION), 'Content-Type': 'application/json' },
        body: JSON.stringify({ status }),
      });
      if (!resp.ok) throw new Error();
      const ind = document.getElementById('statusSaved');
      ind.classList.add('show');
      setTimeout(() => ind.classList.remove('show'), 2000);
    } catch {
      showToast('Erreur lors de la sauvegarde.');
    }
  }

  async function saveNotes() {
    const notes = document.getElementById('notesField').value;
    try {
      const resp = await fetch(`/api/cases/${caseId}`, {
        method: 'PATCH',
        headers: { ...authHeaders(SESSION), 'Content-Type': 'application/json' },
        body: JSON.stringify({ notes }),
      });
      if (!resp.ok) throw new Error();
      const ind = document.getElementById('notesSaved');
      ind.classList.add('show');
      setTimeout(() => ind.classList.remove('show'), 2000);
    } catch {
      showToast('Erreur lors de la sauvegarde.');
    }
  }

  async function init() {
    SESSION = await requireAuth();
    const email = SESSION.user?.email || '';
    document.getElementById('userEmail').textContent = email;
    document.getElementById('userAvatar').textContent = email.charAt(0).toUpperCase() || 'U';
    loadCase();
  }

  document.getElementById('logoutBtn').addEventListener('click', sbLogout);
  document.getElementById('mobileLogout').addEventListener('click', sbLogout);

  document.getElementById('saveStatusBtn').addEventListener('click', () => {
    saveStatus(document.getElementById('statusSelectMobile').value);
  });

  document.getElementById('statusSelect').addEventListener('change', e => {
    document.getElementById('statusSelectMobile').value = e.target.value;
  });

  document.getElementById('statusSelectMobile').addEventListener('change', e => {
    document.getElementById('statusSelect').value = e.target.value;
  });

  document.getElementById('saveNotesBtn').addEventListener('click', saveNotes);

  document.getElementById('copyBtn').addEventListener('click', () => {
    const lettre = document.getElementById('lettreText').textContent;
    navigator.clipboard.writeText(lettre).then(() => showToast('Lettre copiée'));
  });

  document.getElementById('downloadBtn').addEventListener('click', () => {
    const lettre = document.getElementById('lettreText').textContent;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([lettre], { type: 'text/plain;charset=utf-8' }));
    a.download = `lettre_justixia_${caseId}.txt`;
    a.click();
  });

  init();
</script>
</body>
</html>
